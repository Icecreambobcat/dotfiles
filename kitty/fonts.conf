font_family      family='JetBrainsMono Nerd Font Mono' style=SemiBold
bold_font        family='JetBrainsMono Nerd Font Mono' style=ExtraBold
italic_font      family='JetBrainsMono Nerd Font Mono' style='SemiBold Italic'
bold_italic_font family='JetBrainsMono Nerd Font Mono' style='ExtraBold Italic'

font_size 10.0
modify_font cell_width 110%
modify_font cell_height 92.5%
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ed00-U+efc1,U+f000-U+f2ff,U+f000-U+f2e0,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

disable_ligatures cursor
